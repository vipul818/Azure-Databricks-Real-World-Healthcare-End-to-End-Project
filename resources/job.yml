resources:
  jobs:
    End_to_end_Project_Job:
      name: End-to-end Project Job updated
      tasks:
        - task_key: Diagnoisis_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/diagnosis_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: Patients_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/patients_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: dim_diagonsis_ingestion
          depends_on:
            - task_key: Diagnoisis_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_diagnosis_ingestion.ipynb
            source: WORKSPACE
        - task_key: dim_patient_ingestion
          depends_on:
            - task_key: Patients_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_patient_ingestion.ipynb
            source: WORKSPACE
        - task_key: hospitals_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/hospitals_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: dim_hospital_ingestion
          depends_on:
            - task_key: hospitals_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_hospital_ingestion.ipynb
            source: WORKSPACE
        - task_key: visit_raws_ingestion_task
          notebook_task:
            notebook_path: ../bronze/visits_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: fact_visit_ingestion
          depends_on:
            - task_key: dim_diagonsis_ingestion
            - task_key: dim_patient_ingestion
            - task_key: visit_raws_ingestion_task
            - task_key: dim_hospital_ingestion
          notebook_task:
            notebook_path: ../silver/fact_visit_ingestion.ipynb
            source: WORKSPACE
        - task_key: readmission_analysis
          depends_on:
            - task_key: fact_visit_ingestion
          notebook_task:
            notebook_path: ../gold/readmission_analysis.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
